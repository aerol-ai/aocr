services:
  web:
    image: ghcr.io/replicatedhq/ttlsh-web:latest
    build:
      context: web
      dockerfile: Dockerfile
      platforms:
        - "linux/amd64"
    container_name: ttlsh-web
    restart: always
    pull_policy: always
    ports:
      - "3000:3000"
    networks:
      - ttlsh-network

  registry:
    image: ghcr.io/replicatedhq/ttlsh-registry:latest
    build:
      context: registry
      dockerfile: Dockerfile
      platforms:
        - "linux/amd64"
    container_name: ttlsh-registry
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
      - "5001:5001"
    networks:
      - ttlsh-network

  hooks:
    image: ghcr.io/replicatedhq/ttlsh-hooks:latest
    build:
      context: hooks
      dockerfile: Dockerfile.hooks
      platforms:
        - "linux/amd64"
    container_name: ttlsh-hooks
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8000
    ports:
      - "8000:8000"
    networks:
      - ttlsh-network

  reaper:
    image: ghcr.io/replicatedhq/ttlsh-reaper:latest
    build:
      context: hooks
      dockerfile: Dockerfile.reap
      platforms:
        - "linux/amd64"
    container_name: ttlsh-reaper
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - ttlsh-network

  auth:
    image: ghcr.io/replicatedhq/ttlsh-auth:latest
    build:
      context: auth
      dockerfile: Dockerfile
    container_name: ttlsh-auth
    restart: always
    env_file: ".env"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - VALIDATION_SERVICE_URL=${VALIDATION_SERVICE_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
    ports:
      - "8080:8080"
    networks:
      - ttlsh-network

  redis:
    image: redis:7-alpine
    container_name: ttlsh-redis
    restart: always
    pull_policy: always
    env_file: ".env"
    ports:
      - "6379:6379"
    networks:
      - ttlsh-network
    volumes:
      - ./redis/data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  postgres:
    image: postgres:15-alpine
    container_name: ttlsh-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ttlsh}
      - POSTGRES_USER=${POSTGRES_USER:-ttlsh_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - ttlsh-network

networks:
  ttlsh-network:
    driver: bridge
