services:
  web:
    image: ${IMAGE_NAMESPACE:-ghcr.io/aerol-ai}/aocr-web:${IMAGE_TAG:-latest}
    build:
      context: web
      dockerfile: Dockerfile
    container_name: aocr-web
    restart: always
    pull_policy: always
    ports:
      - "3000:3000"
    networks:
      - aocr-network

  registry:
    image: ${IMAGE_NAMESPACE:-ghcr.io/aerol-ai}/aocr-registry:${IMAGE_TAG:-latest}
    build:
      context: registry
      dockerfile: Dockerfile
    container_name: aocr-registry
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - PORT=5000
      - HOOK_TOKEN=${HOOK_TOKEN:-placeholder}
      - HOOK_URI=http://hooks:8000/v1/hook/registry-event
      - REPLREG_HOST=${REPLREG_HOST:-aerol.ai}
      - REPLREG_SECRET=${REPLREG_SECRET:-placeholder}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-aocr}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - minio
      - hooks
    networks:
      - aocr-network

  minio:
    image: minio/minio
    container_name: aocr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./minio/data:/data
    networks:
      - aocr-network
    command: server /data --console-address ":9001"

  hooks:
    image: ${IMAGE_NAMESPACE:-ghcr.io/aerol-ai}/aocr-hooks:${IMAGE_TAG:-latest}
    build:
      context: hooks
      dockerfile: Dockerfile.hooks
    container_name: aocr-hooks
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8000
      - HOOK_TOKEN=${HOOK_TOKEN:-placeholder}
      - DATABASE_URL=postgres://${POSTGRES_USER:-aocr_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocr}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - aocr-network

  reaper:
    image: ${IMAGE_NAMESPACE:-ghcr.io/aerol-ai}/aocr-reaper:${IMAGE_TAG:-latest}
    build:
      context: hooks
      dockerfile: Dockerfile.reap
    container_name: aocr-reaper
    restart: always
    pull_policy: always
    env_file: ".env"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://${POSTGRES_USER:-aocr_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocr}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REGISTRY_URL=http://registry:5000
      - "REAPER_SCHEDULE=${REAPER_SCHEDULE:-* * * * *}"
      - REPOSITORY_IDS=${REPOSITORY_IDS:-}
    depends_on:
      - postgres
      - redis
      - registry
    networks:
      - aocr-network

  auth:
    image: ${IMAGE_NAMESPACE:-ghcr.io/aerol-ai}/aocr-auth:${IMAGE_TAG:-latest}
    build:
      context: auth
      dockerfile: Dockerfile
    container_name: aocr-auth
    restart: always
    env_file: ".env"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-aocr_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocr}
      - VALIDATION_SERVICE_URL=${VALIDATION_SERVICE_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - aocr-network

  redis:
    image: redis:8.5-alpine
    container_name: aocr-redis
    restart: always
    pull_policy: always
    env_file: ".env"
    ports:
      - "6379:6379"
    networks:
      - aocr-network
    volumes:
      - ./redis/data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  postgres:
    image: postgres:17-alpine
    container_name: aocr-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-aocr}
      - POSTGRES_USER=${POSTGRES_USER:-aocr_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - aocr-network

networks:
  aocr-network:
    driver: bridge
