apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ttlsh.fullname" . }}-registry-config
data:
  config.yml: |
    version: 0.1
    log:
      level: info
      formatter: text
    storage:
      delete:
        enabled: true
      gcs:
        bucket: {{ .Values.registry.gcs.bucket }}
        keyfile: /etc/docker/registry/gcs.json
        rootdirectory: /
    http:
      addr: 0.0.0.0:{{ .Values.registry.port }}
      secret: "placeholder-secret"
      host: {{ .Values.global.domain }}
    auth:
      token:
        realm: "https://{{ .Values.global.domain }}/v2/token"
        service: "ttl.sh"
        issuer: "ttl-auth"
        rootcertbundle: /etc/docker/registry/auth.crt
    notifications:
      endpoints:
        - name: registry-hooks
          url: http://{{ include "ttlsh.fullname" . }}-hooks:8000/v1/hook/registry-event
          timeout: 1s
          threshold: 10
          backoff: 1s
