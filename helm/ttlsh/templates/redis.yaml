apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ttlsh.fullname" . }}-redis
  labels:
    {{- include "ttlsh.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ttlsh.name" . }}-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ttlsh.name" . }}-redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports:
        - containerPort: 6379
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "ttlsh.fullname" . }}-secrets
              key: redis-password
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ttlsh.fullname" . }}-redis
spec:
  ports:
  - port: 6379
  selector:
    app.kubernetes.io/name: {{ include "ttlsh.name" . }}-redis
