# Default values for aocr.
# This is a YAML-formatted file.

global:
  domain: "aerol.ai"

image:
  repository: ghcr.io/aerol-ai
  pullPolicy: Always
  tag: "latest"

# PostgreSQL Configuration
postgres:
  enabled: true
  image: postgres:17-alpine
  host: ""
  port: 5432
  database: aocr
  user: aocr_user
  # Provide password in a secret or here (not recommended for prod)
  password: "change-me"
  persistence:
    enabled: true
    size: 10Gi

# Auth Service Configuration
auth:
  enabled: true
  port: 8080
  validationServiceUrl: "https://api.thirdparty.com/api/auth/info"
  jwtPrivateKey: ""
  jwtPublicKey: ""

# Registry Configuration
registry:
  port: 5000
  replregSecret: "change-me"
  s3:
    region: "us-east-1"
    bucket: "aocr"
    endpoint: "http://minio:9000"
    accessKey: ""
    secretKey: ""

# Redis Configuration
redis:
  enabled: true
  image: redis:8.5-alpine
  password: "change-me"

# Hooks & Reaper
hooks:
  port: 8000
  token: "change-me"

reaper:
  schedule: "* * * * *"
  # Leave empty to sweep all repositories, or set repository UUIDs to limit the cron job scope.
  repositoryIds: []

# Web Frontend
web:
  port: 3000
