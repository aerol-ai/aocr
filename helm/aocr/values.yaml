# Default values for aocr.
# This is a YAML-formatted file.

global:
  domain: "aerol.ai"

image:
  repository: ghcr.io/aerol-ai
  pullPolicy: Always
  tag: "latest"

# PostgreSQL Configuration
postgres:
  enabled: true
  image: postgres:17-alpine
  database: aocr
  user: aocr_user
  # Provide password in a secret or here (not recommended for prod)
  password: "change-me"
  persistence:
    enabled: true
    size: 10Gi

# Auth Service Configuration
auth:
  enabled: true
  port: 8080
  validationServiceUrl: "https://api.thirdparty.com/v1"
  # Provide JWT_PRIVATE_KEY in a secret

# Registry Configuration
registry:
  port: 5000
  s3:
    region: "us-east-1"
    bucket: "aocr"
    endpoint: "http://minio:9000"
    # Provide access/secret keys in a secret

# Redis Configuration
redis:
  enabled: true
  image: redis:8.5-alpine
  password: "change-me"

# Hooks & Reaper
hooks:
  port: 8000

reaper:
  schedule: "* * * * *"

# Web Frontend
web:
  port: 3000
