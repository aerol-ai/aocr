apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aocr.fullname" . }}-auth
  labels:
    {{- include "aocr.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
    spec:
      containers:
      - name: auth
        image: "{{ .Values.image.repository }}/aocr-auth:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.auth.port }}
        env:
        - name: DATABASE_URL
          value: "postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "aocr.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
        - name: VALIDATION_SERVICE_URL
          value: {{ .Values.auth.validationServiceUrl }}
        - name: JWT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "aocr.fullname" . }}-secrets
              key: jwt-private-key
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "aocr.fullname" . }}-secrets
              key: postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aocr.fullname" . }}-auth
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: {{ .Values.auth.port }}
  selector:
    app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
