apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aocr.fullname" . }}-auth
  labels:
    {{- include "aocr.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
    spec:
      containers:
      - name: auth
        image: "{{ .Values.image.repository }}/aocr-auth:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.auth.port }}
        env:
        - name: POSTGRES_HOST
          value: {{ default (printf "%s-postgres" (include "aocr.fullname" .)) .Values.postgres.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "aocr.fullname" . }}-secrets
              key: postgres-password
        - name: VALIDATION_SERVICE_URL
          value: {{ .Values.auth.validationServiceUrl | quote }}
        - name: JWT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "aocr.fullname" . }}-secrets
              key: jwt-private-key
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aocr.fullname" . }}-auth
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: {{ .Values.auth.port }}
  selector:
    app.kubernetes.io/name: {{ include "aocr.name" . }}-auth
