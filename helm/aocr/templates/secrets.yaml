{{- $jwtPrivateKey := required "auth.jwtPrivateKey is required" .Values.auth.jwtPrivateKey -}}
{{- $jwtPublicCertificate := required "auth.jwtPublicCertificate is required and must contain a PEM certificate (BEGIN CERTIFICATE)" (default .Values.auth.jwtPublicKey .Values.auth.jwtPublicCertificate) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aocr.fullname" . }}-secrets
type: Opaque
data:
  postgres-password: {{ .Values.postgres.password | b64enc | quote }}
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  hook-token: {{ .Values.hooks.token | b64enc | quote }}
  replreg-secret: {{ .Values.registry.replregSecret | b64enc | quote }}
  # Provide plain string values. This template base64-encodes them for the Kubernetes Secret.
  jwt-private-key: {{ $jwtPrivateKey | b64enc | quote }}
  jwt-public-cert: {{ $jwtPublicCertificate | b64enc | quote }}
  jwt-public-key: {{ $jwtPublicCertificate | b64enc | quote }}
  s3-access-key: {{ default "" .Values.registry.s3.accessKey | b64enc | quote }}
  s3-secret-key: {{ default "" .Values.registry.s3.secretKey | b64enc | quote }}
