name: Publish Packages

on:
  push:
    branches:
      - main
      - prerelease
  workflow_dispatch:

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  CHART_NAMESPACE: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth
            image: aocr-auth
            context: ./auth
            dockerfile: ./auth/Dockerfile
          - name: hooks
            image: aocr-hooks
            context: ./hooks
            dockerfile: ./hooks/Dockerfile.hooks
          - name: reaper
            image: aocr-reaper
            context: ./hooks
            dockerfile: ./hooks/Dockerfile.reap
          - name: registry
            image: aocr-registry
            context: ./registry
            dockerfile: ./registry/Dockerfile
          - name: web
            image: aocr-web
            context: ./web
            dockerfile: ./web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  package-chart:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Log in to GitHub Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push Helm chart
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          BASE_VERSION="$(awk '/^version:/ {print $2}' helm/aocr/Chart.yaml)"
          CHART_VERSION="${BASE_VERSION}-${REF_NAME}.${RUN_NUMBER}"
          mkdir -p .chart-packages
          helm lint helm/aocr
          helm package helm/aocr \
            --destination .chart-packages \
            --version "${CHART_VERSION}" \
            --app-version "${SHA}"
          helm push ".chart-packages/aocr-${CHART_VERSION}.tgz" "${CHART_NAMESPACE}"
